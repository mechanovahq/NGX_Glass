name: Fetch NGX Live Prices

on:
  schedule:
    # Every 15 minutes Mon–Fri during NGX market hours (10:00–14:30 WAT = 09:00–13:30 UTC)
    - cron: '*/15 9-13 * * 1-5'
    # One run at 08:55 UTC (before market open) and 14:00 UTC (after close) to capture snapshots
    - cron: '55 8 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse NGX prices from afx.kwayisi.org
        run: |
          python3 << 'EOF'
          import urllib.request
          import urllib.error
          import re
          import json
          import os
          import time
          from datetime import datetime, timezone, timedelta

          def fetch_page(url, retries=5, base_delay=8):
              headers = {
                  'User-Agent': 'Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36',
                  'Accept': 'text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,*/*;q=0.8',
                  'Accept-Language': 'en-US,en;q=0.9',
                  'Accept-Encoding': 'gzip, deflate',
                  'Connection': 'keep-alive',
                  'Upgrade-Insecure-Requests': '1',
                  'Cache-Control': 'max-age=0',
              }
              last_err = None
              for attempt in range(retries):
                  if attempt > 0:
                      delay = base_delay * attempt
                      print(f'Retry {attempt}/{retries-1} for {url} (waiting {delay}s)')
                      time.sleep(delay)
                  try:
                      req = urllib.request.Request(url, headers=headers)
                      with urllib.request.urlopen(req, timeout=60) as resp:
                          raw = resp.read()
                          # handle gzip if server sends it despite not asking
                          if resp.info().get('Content-Encoding') == 'gzip':
                              import gzip
                              raw = gzip.decompress(raw)
                          return raw.decode('utf-8', errors='replace')
                  except Exception as e:
                      last_err = e
                      print(f'Attempt {attempt+1} failed: {e}')
              raise last_err

          def strip_tags(s):
              return re.sub(r'<[^>]+>', '', s).strip()

          def parse_stocks(html):
              results = []
              table_start = html.find('<th>Ticker')
              if table_start == -1:
                  return results
              rows = html[table_start:].split('<tr>')[1:]
              for row in rows:
                  cells_raw = row.split('<td>')[1:]
                  cells = [strip_tags(c) for c in cells_raw]
                  if len(cells) < 4:
                      continue
                  sym = re.sub(r'[^A-Z0-9]', '', cells[0].upper())
                  try:
                      price = float(cells[3].replace(',', ''))
                  except:
                      continue
                  try:
                      change = float((cells[4] if len(cells) > 4 else '0').replace(',', ''))
                  except:
                      change = 0.0
                  if len(sym) >= 2 and price > 0:
                      prev = price - change
                      pct = round((change / prev * 100) if prev > 0 else 0, 4)
                      results.append({'sym': sym, 'price': price, 'change': change, 'changePct': pct})
              return results

          def parse_market_summary(html):
              """Extract ASI index value, change, turnover, shares traded from page."""
              summary = {}
              # ASI: look for patterns like "109,142.36" near "All-Share" or "ASI"
              asi_match = re.search(
                  r'All.?Share[^<]*</[^>]+>\s*<[^>]+>\s*([\d,]+\.?\d*)',
                  html, re.IGNORECASE
              )
              if not asi_match:
                  asi_match = re.search(
                      r'ASI[^<]{0,80}([\d]{3},[\d]{3}(?:\.[\d]+)?)',
                      html, re.IGNORECASE
                  )
              if asi_match:
                  try:
                      summary['asi'] = float(asi_match.group(1).replace(',', ''))
                  except:
                      pass

              if 'asi' in summary:
                  change_match = re.search(
                      r'([-+]?[\d,]+\.[\d]+)\s*\(?([-+]?[\d.]+)%\)?',
                      html[max(0, asi_match.start()-200):asi_match.start()+400]
                  )
                  if change_match:
                      try:
                          summary['asiChange'] = float(change_match.group(1).replace(',', ''))
                          summary['asiChangePct'] = float(change_match.group(2))
                      except:
                          pass

              turn_match = re.search(
                  r'[Tt]urnover[^<]{0,100}([\d,]+(?:\.[\d]+)?)',
                  html
              )
              if turn_match:
                  try:
                      val = float(turn_match.group(1).replace(',', ''))
                      if val > 1_000_000:
                          summary['turnover'] = '₦' + f'{val/1_000_000_000:.2f}' + 'B'
                      elif val > 0:
                          summary['turnover'] = '₦' + f'{val:.2f}' + 'B'
                  except:
                      pass

              shares_match = re.search(
                  r'[Vv]olume[^<]{0,100}([\d,]+(?:\.[\d]+)?)',
                  html
              )
              if shares_match:
                  try:
                      val = float(shares_match.group(1).replace(',', ''))
                      if val > 1_000_000_000:
                          summary['sharesTraded'] = f'{val/1_000_000_000:.2f}B'
                      elif val > 1_000_000:
                          summary['sharesTraded'] = f'{val/1_000_000:.1f}M'
                  except:
                      pass

              return summary

          try:
              print('Fetching page 1...')
              page1 = fetch_page('https://afx.kwayisi.org/ngx/')
              print(f'Page 1 fetched ({len(page1)} chars)')

              print('Fetching page 2...')
              page2 = fetch_page('https://afx.kwayisi.org/ngx/?page=2')
              print(f'Page 2 fetched ({len(page2)} chars)')

              all_stocks = parse_stocks(page1) + parse_stocks(page2)
              seen = set()
              result = []
              for s in all_stocks:
                  if s['sym'] not in seen:
                      seen.add(s['sym'])
                      result.append(s)

              if not result:
                  print('ERROR: Parsed 0 stocks — aborting')
                  exit(1)

              market_summary = parse_market_summary(page1)
              print(f'Market summary extracted: {market_summary}')

              wat = datetime.now(timezone(timedelta(hours=1)))
              output = {
                  'result': result,
                  'updated': wat.strftime('%Y-%m-%dT%H:%M:%S+01:00'),
                  'count': len(result),
              }
              output.update(market_summary)

              os.makedirs('data', exist_ok=True)
              with open('data/prices.json', 'w') as f:
                  json.dump(output, f, separators=(',', ':'))
              print(f'Saved {len(result)} stocks')
          except Exception as e:
              print(f'FETCH ERROR: {e}')
              exit(1)
          EOF

      - name: Commit updated prices
        run: |
          git config user.name "NGXGlass Bot"
          git config user.email "ngxglass@gmail.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "chore: update live prices [skip ci]"
            git push
          fi
