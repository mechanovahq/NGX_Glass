name: Fetch NGX Live Prices

on:
  schedule:
    # Every 15 minutes Mon–Fri during NGX market hours (10:00–14:30 WAT = 09:00–13:30 UTC)
    - cron: '*/15 9-13 * * 1-5'
    # Snapshot before open and after close
    - cron: '55 8 * * 1-5'
    - cron: '0 14 * * 1-5'
  workflow_dispatch:

jobs:
  fetch-prices:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch NGX live prices via NGX Pulse API
        run: |
          python3 << 'EOF'
          import urllib.request
          import json
          import os
          from datetime import datetime, timezone, timedelta

          NGX_BASE = "https://ngxpulse.ng/api"
          NGX_API_KEY = "ngxpulse_c6maakeuc936ai8r"

          def ngx_fetch(path):
              req = urllib.request.Request(
                  f"{NGX_BASE}{path}",
                  headers={
                      "X-API-Key": NGX_API_KEY,
                      "User-Agent": "NGXGlass/1.0",
                      "Accept": "application/json",
                  }
              )
              with urllib.request.urlopen(req, timeout=30) as resp:
                  return json.loads(resp.read().decode("utf-8"))

          try:
              print("Fetching NGX stocks...")
              stocks_raw = ngx_fetch("/ngxdata/stocks")
              print(f"Got {len(stocks_raw)} stocks from API")

              print("Fetching NGX market summary...")
              try:
                  market_raw = ngx_fetch("/ngxdata/market")
              except Exception as e:
                  print(f"Market summary fetch failed (non-fatal): {e}")
                  market_raw = {}

              # Parse stocks
              result = []
              seen = set()
              for s in stocks_raw:
                  sym = str(s.get("symbol", "")).upper().strip()
                  price = float(s.get("current_price", 0) or 0)
                  change_pct = float(s.get("change_percent", 0) or 0)
                  if not sym or price <= 0 or sym in seen:
                      continue
                  seen.add(sym)
                  # Derive absolute change from price and percent
                  prev = price / (1 + change_pct / 100) if change_pct != -100 else price
                  change = round(price - prev, 4)
                  result.append({
                      "sym": sym,
                      "price": price,
                      "change": change,
                      "changePct": round(change_pct, 4),
                  })

              if not result:
                  print("ERROR: Parsed 0 stocks — aborting")
                  exit(1)

              # Parse market summary
              output_extra = {}
              if market_raw:
                  print(f"Market raw keys: {list(market_raw.keys())}")
                  # Try common field names for ASI
                  for key in ("asi", "all_share_index", "index_value", "value"):
                      if key in market_raw:
                          try:
                              output_extra["asi"] = float(str(market_raw[key]).replace(",", ""))
                          except:
                              pass
                          break
                  for key in ("change", "asi_change", "index_change"):
                      if key in market_raw:
                          try:
                              output_extra["asiChange"] = float(str(market_raw[key]).replace(",", ""))
                          except:
                              pass
                          break
                  for key in ("change_percent", "asi_change_percent", "percent_change"):
                      if key in market_raw:
                          try:
                              output_extra["asiChangePct"] = float(str(market_raw[key]).replace(",", ""))
                          except:
                              pass
                          break
                  for key in ("turnover", "total_turnover", "market_turnover"):
                      if key in market_raw:
                          raw_t = market_raw[key]
                          try:
                              val = float(str(raw_t).replace(",", "").replace("₦", ""))
                              if val > 1_000_000:
                                  output_extra["turnover"] = "₦" + f"{val/1_000_000_000:.2f}" + "B"
                              else:
                                  output_extra["turnover"] = str(raw_t)
                          except:
                              output_extra["turnover"] = str(raw_t)
                          break
                  for key in ("volume", "shares_traded", "total_volume", "total_shares"):
                      if key in market_raw:
                          try:
                              val = float(str(market_raw[key]).replace(",", ""))
                              if val > 1_000_000_000:
                                  output_extra["sharesTraded"] = f"{val/1_000_000_000:.2f}B"
                              elif val > 1_000_000:
                                  output_extra["sharesTraded"] = f"{val/1_000_000:.1f}M"
                          except:
                              pass
                          break

              wat = datetime.now(timezone(timedelta(hours=1)))
              output = {
                  "result": result,
                  "updated": wat.strftime("%Y-%m-%dT%H:%M:%S+01:00"),
                  "count": len(result),
              }
              output.update(output_extra)
              print(f"Market stats included: {output_extra}")

              os.makedirs("data", exist_ok=True)
              with open("data/prices.json", "w") as f:
                  json.dump(output, f, separators=(",", ":"))
              print(f"Saved {len(result)} stocks to data/prices.json")

          except Exception as e:
              print(f"FETCH ERROR: {e}")
              import traceback; traceback.print_exc()
              exit(1)
          EOF

      - name: Commit updated prices
        run: |
          git config user.name "NGXGlass Bot"
          git config user.email "ngxglass@gmail.com"
          git add data/prices.json
          if git diff --staged --quiet; then
            echo "No price changes — skipping commit"
          else
            git commit -m "chore: update live prices [skip ci]"
            git push
          fi
